# ===============================================
# PAGE REVIEWS
# ===============================================

extend type Query {
  pageReviews: PageReviewQuery
}

extend type Mutation {
  pageReviews: PageReviewMutation
}

# -----------------------------------------------
# QUERIES
# -----------------------------------------------

type PageReviewQuery {
  list(
    status: PageReviewStatus
    limit: Int
    offset: Int
  ): [PageReview]! @auth(requires: ["approve:pages", "manage:system"])

  single(
    id: Int!
  ): PageReview @auth(requires: ["write:pages:pending", "approve:pages", "manage:system"])

  ownPending(
    locale: String!
    path: String!
  ): PageReview @auth(requires: ["write:pages:pending", "manage:system"])
}

# -----------------------------------------------
# MUTATIONS
# -----------------------------------------------

type PageReviewMutation {
  submit(
    content: String!
    description: String!
    editor: String!
    isPublished: Boolean!
    locale: String!
    path: String!
    publishEndDate: Date
    publishStartDate: Date
    scriptCss: String
    scriptJs: String
    tags: [String]!
    title: String!
    changeReason: String!
  ): PageReviewResponse @auth(requires: ["write:pages:pending", "manage:system"]) @rateLimit(limit: 10, duration: 60)

  approve(
    id: Int!
    comment: String
  ): PageReviewResponse @auth(requires: ["approve:pages", "manage:system"]) @rateLimit(limit: 20, duration: 60)

  reject(
    id: Int!
    comment: String
  ): PageReviewResponse @auth(requires: ["approve:pages", "manage:system"]) @rateLimit(limit: 20, duration: 60)

  withdraw(
    id: Int!
  ): PageReviewResponse @auth(requires: ["write:pages:pending", "manage:system"]) @rateLimit(limit: 10, duration: 60)
}

# -----------------------------------------------
# TYPES
# -----------------------------------------------

enum PageReviewStatus {
  pending
  approved
  rejected
  all
}

type PageReview {
  id: Int!
  pageId: Int
  locale: String!
  path: String!
  title: String!
  description: String!
  content: String!
  contentType: String!
  editor: String!
  tags: [String]!
  scriptCss: String
  scriptJs: String
  isPublished: Boolean!
  publishStartDate: String
  publishEndDate: String
  changeReason: String!
  status: PageReviewStatus!
  gitBranch: String
  authorId: Int!
  authorName: String
  authorEmail: String
  reviewerId: Int
  reviewerName: String
  reviewerComment: String
  createdAt: Date!
  updatedAt: Date!
  reviewedAt: Date
  liveContent: String
}

type PageReviewResponse {
  responseResult: ResponseStatus
  review: PageReview
}
